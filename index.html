<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA en Analítica Digital con GA4</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f1117;
    color: #e8eaf0;
    min-height: 100vh;
    padding: 28px 20px;
  }
  .header { text-align: center; margin-bottom: 32px; }
  .header h1 { font-size: 1.7rem; font-weight: 700; color: #fff; letter-spacing: -0.02em; margin-bottom: 6px; }
  .header p { color: #7b8099; font-size: 0.85rem; }
  .badge-legend { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 28px; }
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.03em; }
  .badge.claude { background: #1e2a1e; color: #6fcf97; border: 1px solid #2d4a2d; }
  .badge.gemini { background: #1a1e2e; color: #7986cb; border: 1px solid #2a3050; }
  .badge.chatgpt { background: #1e2a24; color: #26a69a; border: 1px solid #1e3a30; }
  .badge.n8n { background: #2a1e1e; color: #ef9a9a; border: 1px solid #4a2020; }
  .badge.multi { background: #2a2218; color: #ffcc80; border: 1px solid #4a3a10; }
  .filter-bar { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; max-width: 960px; margin-left: auto; margin-right: auto; }
  .filter-btn { background: #161b27; border: 1px solid #232840; color: #7b8099; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover, .filter-btn.active { background: #1e2a4a; border-color: #4a6aaa; color: #a0c0ff; }
  .phases-container { max-width: 960px; margin: 0 auto; display: flex; flex-direction: column; gap: 6px; }
  .phase-block { background: #161b27; border: 1px solid #232840; border-radius: 12px; overflow: hidden; transition: border-color 0.2s; }
  .phase-block:hover { border-color: #3a4060; }
  .phase-header { display: flex; align-items: center; gap: 14px; padding: 16px 20px; cursor: pointer; user-select: none; }
  .phase-number { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; flex-shrink: 0; }
  .phase-title { flex: 1; }
  .phase-title h2 { font-size: 0.95rem; font-weight: 600; color: #fff; line-height: 1.2; }
  .phase-title .subtitle { font-size: 0.72rem; color: #5a6080; margin-top: 2px; }
  .phase-count { font-size: 0.7rem; color: #5a6080; background: #1e2335; padding: 2px 8px; border-radius: 10px; }
  .chevron { color: #5a6080; font-size: 0.8rem; transition: transform 0.25s; flex-shrink: 0; }
  .phase-block.open .chevron { transform: rotate(180deg); }
  .phase-body { display: none; padding: 0 20px 16px; }
  .phase-block.open .phase-body { display: block; }
  .items-list { display: flex; flex-direction: column; gap: 8px; }
  .item-card { background: #0f1117; border: 1px solid #1e2335; border-radius: 8px; padding: 12px 14px; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
  .item-card:hover { background: #161b27; border-color: #2e3555; }
  .item-card.expanded { background: #131720; border-color: #2e3555; }
  .item-top { display: flex; align-items: flex-start; gap: 10px; }
  .item-icon { font-size: 1rem; line-height: 1; margin-top: 1px; flex-shrink: 0; }
  .item-main { flex: 1; min-width: 0; }
  .item-name { font-size: 0.82rem; font-weight: 600; color: #d0d4e8; line-height: 1.3; }
  .item-tools { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .item-detail { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid #1e2335; font-size: 0.75rem; color: #7b8099; line-height: 1.6; }
  .item-card.expanded .item-detail { display: block; }
  .detail-prompt { margin-top: 8px; background: #0a0d14; border: 1px solid #1a1f30; border-radius: 6px; padding: 8px 10px; font-family: 'Courier New', monospace; font-size: 0.7rem; color: #a0aec0; font-style: italic; }
  .detail-prompt::before { content: "💬 Prompt / caso de uso: "; font-style: normal; color: #5a6080; font-family: 'Segoe UI', system-ui, sans-serif; display: block; margin-bottom: 4px; font-size: 0.65rem; }
  .p1 .phase-number { background: #1a2a3a; color: #4fc3f7; }
  .p2 .phase-number { background: #1a2a2a; color: #4dd0e1; }
  .p3 .phase-number { background: #1a2a1a; color: #81c784; }
  .p4 .phase-number { background: #2a2a1a; color: #fff176; }
  .p5 .phase-number { background: #2a1a2a; color: #ce93d8; }
  .p6 .phase-number { background: #2a1a1a; color: #ef9a9a; }
  .p7 .phase-number { background: #1a2040; color: #90caf9; }
  .p8 .phase-number { background: #202a1a; color: #a5d6a7; }
  .p1 { border-left: 3px solid #4fc3f7; }
  .p2 { border-left: 3px solid #4dd0e1; }
  .p3 { border-left: 3px solid #81c784; }
  .p4 { border-left: 3px solid #fff176; }
  .p5 { border-left: 3px solid #ce93d8; }
  .p6 { border-left: 3px solid #ef9a9a; }
  .p7 { border-left: 3px solid #90caf9; }
  .p8 { border-left: 3px solid #a5d6a7; }
  .total-bar { text-align: center; margin-top: 20px; padding: 12px; background: #161b27; border-radius: 8px; font-size: 0.75rem; color: #5a6080; max-width: 960px; margin-left: auto; margin-right: auto; }
  .total-bar span { color: #a0b0ff; font-weight: 700; }
</style>
</head>
<body>
<div class="header">
  <h1>🤖 IA en Analítica Digital con GA4</h1>
  <p>Guía completa de casos de uso ordenados por fase del proyecto · Haz clic en cada fase para expandir</p>
</div>
<div class="badge-legend">
  <span class="badge claude">● Claude</span>
  <span class="badge gemini">● Gemini</span>
  <span class="badge chatgpt">● ChatGPT</span>
  <span class="badge n8n">● n8n</span>
  <span class="badge multi">● Multi-herramienta</span>
</div>
<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" onclick="filterPhase('all', this)">Todas las fases</button>
  <button class="filter-btn" onclick="filterPhase('p1', this)">Estrategia</button>
  <button class="filter-btn" onclick="filterPhase('p2', this)">Configuración GA4</button>
  <button class="filter-btn" onclick="filterPhase('p3', this)">GTM</button>
  <button class="filter-btn" onclick="filterPhase('p4', this)">Integraciones</button>
  <button class="filter-btn" onclick="filterPhase('p5', this)">Visualización</button>
  <button class="filter-btn" onclick="filterPhase('p6', this)">Análisis</button>
  <button class="filter-btn" onclick="filterPhase('p7', this)">Automatización</button>
  <button class="filter-btn" onclick="filterPhase('p8', this)">Agentes & MCP</button>
</div>
<div class="phases-container" id="phasesContainer"></div>
<div class="total-bar" id="totalBar"></div>

<script>
const phases = [
  {
    id: 'p1', num: '01', title: 'Estrategia & Plan de Medición', subtitle: 'Antes de tocar una herramienta',
    items: [
      { icon: '🗺️', name: 'Elaborar el Plan de Medición Digital', tools: ['multi'], detail: 'Define objetivos de negocio → KPIs → eventos GA4 → dimensiones custom. La IA estructura el plan completo a partir de una descripción del negocio, tipo de web y objetivos.', prompt: '"Eres un consultor de analítica. Mi web es un ecommerce de formación online. Genera un Plan de Medición completo con objetivos, KPIs y eventos GA4 necesarios."' },
      { icon: '🏷️', name: 'Crear la Guía de Etiquetado de UTMs', tools: ['multi'], detail: 'La IA genera una guía de convenciones UTM adaptada a la empresa: taxonomía de canales, naming conventions, ejemplos reales, tabla de referencia descargable.', prompt: '"Crea una guía de etiquetado UTM para una empresa con campañas en Google Ads, Meta Ads, email y eventos presenciales. Incluye tabla de valores permitidos por parámetro."' },
      { icon: '💎', name: 'Crear un Gem / GPT especialista en UTMs', tools: ['gemini', 'chatgpt'], detail: 'Un agente entrenado con tu guía de UTMs que genera automáticamente URLs etiquetadas a partir de inputs simples (plataforma, campaña, contenido). Disponible como Gemini Gem o ChatGPT GPT.', prompt: 'El system prompt incluye la guía UTM. El usuario escribe: "Email de bienvenida para campaña de enero en HubSpot" → el agente devuelve la URL correctamente etiquetada.' },
      { icon: '📋', name: 'Taxonomía de eventos y parámetros GA4', tools: ['multi'], detail: 'Definir la nomenclatura y estructura de todos los eventos custom, parámetros y dimensiones personalizadas antes de la implementación. Evita inconsistencias futuras.', prompt: '"Propón una taxonomía de eventos GA4 para un sitio de membresía con contenido, cursos y ecommerce. Sigue las convenciones snake_case de Google."' },
      { icon: '📊', name: 'Análisis de benchmarks del sector', tools: ['claude', 'chatgpt'], detail: 'Identificar qué métricas y conversiones son relevantes en el sector, comparando con benchmarks de la industria para establecer metas realistas en el plan.', prompt: '"¿Cuáles son los benchmarks de tasa de conversión, bounce rate y tiempo de sesión para un ecommerce de formación online en España?"' },
      { icon: '🎯', name: 'Definir la estrategia de segmentación de audiencias', tools: ['claude', 'gemini'], detail: 'Proponer qué segmentos de usuarios definir en GA4 y Google Ads desde el inicio, alineados con los objetivos de negocio y las etapas del funnel.', prompt: '"Para un SaaS B2B, propón una estrategia de segmentación de audiencias en GA4: qué segmentos crear, qué comportamientos definen cada uno y cómo usarlos en campañas."' }
    ]
  },
  {
    id: 'p2', num: '02', title: 'Configuración de GA4', subtitle: 'Setup, propiedades y parametrización',
    items: [
      { icon: '⚙️', name: 'Auditar una propiedad GA4 existente', tools: ['claude'], detail: 'Con el MCP de GA4, Claude puede revisar la configuración de la propiedad, detectar inconsistencias, eventos sin datos, conversiones duplicadas o configuraciones incorrectas.', prompt: '"Revisa mi propiedad GA4 y dame un informe de posibles problemas: eventos sin actividad en los últimos 30 días, conversiones duplicadas, dimensiones custom sin uso."' },
      { icon: '🛡️', name: 'Verificar el Consent Mode con la extensión de Chrome', tools: ['claude'], detail: 'La extensión de Claude para Chrome analiza el comportamiento del CMP/banner de cookies e indica si el Consent Mode v2 está correctamente implementado y enviando señales a GA4.', prompt: 'Desde la extensión en la web: "Comprueba si el Consent Mode v2 está activo, si las señales ad_storage y analytics_storage cambian al aceptar/rechazar cookies."' },
      { icon: '🎯', name: 'Configurar conversiones y audiencias de GA4', tools: ['gemini', 'chatgpt'], detail: 'La IA guía la configuración de eventos como conversiones, propone audiencias de remarketing basadas en el comportamiento y sugiere el setup óptimo según los objetivos.', prompt: '"Quiero medir como conversión el registro en mi plataforma. Explícame cómo marcar el evento sign_up como conversión en GA4 y qué audiencias de remarketing crear."' },
      { icon: '🔗', name: 'Guía personalizada de dimensiones custom', tools: ['claude', 'chatgpt'], detail: 'Proponer qué dimensiones y métricas personalizadas de usuario y evento registrar en GA4 según el modelo de negocio. Límites de 25 dimensiones de usuario y 50 de evento.', prompt: '"Para un SaaS con planes Starter/Pro/Enterprise, propón qué dimensiones custom de usuario y evento debería registrar en GA4 y cómo estructurarlas."' },
      { icon: '📋', name: 'Documentar la configuración de GA4 automáticamente', tools: ['claude'], detail: 'A partir de los datos del MCP o de una exportación, generar documentación técnica actualizada de la propiedad: eventos activos, conversiones, dimensiones y flujos configurados.', prompt: '"Genera un documento Markdown con la configuración actual de mi propiedad GA4: lista todos los eventos activos, conversiones, dimensiones custom y su descripción."' }
    ]
  },
  {
    id: 'p3', num: '03', title: 'Implementación Técnica con GTM', subtitle: 'Tags, triggers, variables y dataLayer',
    items: [
      { icon: '📦', name: 'Generar código de dataLayer desde descripción', tools: ['claude', 'chatgpt'], detail: 'Describe qué datos quieres capturar (valor de un formulario, plan del usuario, estado de login) y la IA genera el código dataLayer.push completo y correcto.', prompt: '"Genera el código dataLayer.push para capturar al hacer login: el tipo de plan del usuario (plan_type), el precio mensual (plan_price) y si está en periodo de prueba (is_trial)."' },
      { icon: '🏷️', name: 'Especificación completa de tags/triggers/variables en GTM', tools: ['claude', 'chatgpt'], detail: 'La IA genera instrucciones paso a paso de qué tag, trigger y variable crear en GTM para cualquier caso de medición, sin necesidad de buscar en la documentación.', prompt: '"Explícame cómo configurar en GTM el tracking de scroll al 75% solo en /blog/ y enviarlo como evento GA4 con el nombre article_read y el parámetro article_title."' },
      { icon: '📄', name: 'Analizar y auditar el JSON exportado de GTM', tools: ['claude', 'chatgpt'], detail: 'Pasa el JSON de exportación de tu contenedor GTM y la IA detecta tags duplicados, triggers sin asociar, variables sin uso, configuraciones incorrectas y oportunidades de mejora.', prompt: '"Aquí está el JSON de mi contenedor GTM. Analízalo: ¿hay tags duplicados? ¿Triggers mal configurados? ¿Variables sin uso? Genera un informe de auditoría con prioridades."' },
      { icon: '✨', name: 'Generar nuevas mediciones desde el JSON de GTM', tools: ['claude', 'chatgpt'], detail: 'A partir de la estructura existente en GTM, la IA propone nuevas mediciones y genera la configuración manteniendo coherencia con el naming y estructura ya presentes.', prompt: '"Dado mi contenedor GTM, propón 5 nuevas mediciones que debería implementar y genera la especificación de tags/triggers/variables para cada una, siguiendo mi nomenclatura."' },
      { icon: '🔎', name: 'Diagnóstico de implementación en tiempo real', tools: ['claude'], detail: 'La extensión de Claude analiza la web: qué dataLayer se dispara, qué tags se activan, si hay errores en la capa de datos o parámetros mal formateados o ausentes.', prompt: 'Desde la extensión: "Analiza los eventos que se están disparando en esta web y dime si hay algún problema con la implementación de GA4 o con los parámetros enviados."' },
      { icon: '🛡️', name: 'Generar regex y filtros para GTM/GA4', tools: ['claude', 'chatgpt'], detail: 'La IA genera expresiones regulares para filtros de URL, condiciones de trigger, filtros de hostname o exclusiones de tráfico interno con la sintaxis exacta de GTM.', prompt: '"Genera una regex para GTM que active un trigger solo en URLs que empiecen por /producto/ o /tienda/ pero no en /tienda/admin/ ni /tienda/checkout/gracias."' },
      { icon: '🔄', name: 'Migrar una implementación de UA a GA4 via GTM', tools: ['claude', 'chatgpt'], detail: 'Analizar las etiquetas de Universal Analytics en GTM y generar el equivalente en GA4, adaptando el modelo de datos y aprovechando los nuevos eventos recomendados.', prompt: '"Tengo estas etiquetas de Universal Analytics en GTM (lista). Tradúcelas a eventos de GA4 manteniendo la misma información y siguiendo el esquema de eventos recomendados de Google."' }
    ]
  },
  {
    id: 'p4', num: '04', title: 'Conexiones e Integraciones', subtitle: 'GA4 + Ads + Search Console + CRM + Meta',
    items: [
      { icon: '🔗', name: 'Vincular GA4 con Google Ads y configurar conversiones', tools: ['gemini', 'chatgpt'], detail: 'Guía paso a paso para vincular propiedades, importar conversiones a Google Ads, activar el autotagging y verificar que la integración funciona correctamente.', prompt: '"Guíame para vincular GA4 con Google Ads, importar mis conversiones de GA4 a Google Ads y configurar el remarketing con audiencias de GA4."' },
      { icon: '🔍', name: 'Análisis cruzado GA4 + Search Console', tools: ['claude'], detail: 'Con los MCP de GA4 y Search Console activos, Claude cruza impresiones/clics orgánicos con sesiones y conversiones para encontrar oportunidades SEO de alto impacto.', prompt: '"Cruza mis queries de Search Console con alta posición pero bajo CTR con la tasa de conversión en GA4 de esas landing pages. ¿Cuáles deberían optimizarse primero?"' },
      { icon: '📧', name: 'Cruzar datos de HubSpot email con GA4', tools: ['claude', 'n8n'], detail: 'Usar el MCP de HubSpot o flujos de n8n para cruzar datos de email marketing (aperturas, clicks) con el comportamiento en web medido por GA4 usando UTMs como enlace.', prompt: '"Analiza qué campañas de email de HubSpot generan más sesiones con conversión en GA4 en los últimos 3 meses, comparando coste por lead por campaña."' },
      { icon: '📱', name: 'Cruzar datos de Meta Ads con GA4', tools: ['claude', 'n8n'], detail: 'Con el MCP de Meta Ads activo, Claude analiza el rendimiento real de campañas de pago social vs las sesiones y conversiones registradas en GA4 para el mismo período.', prompt: '"Compara el ROAS de mis campañas de Meta Ads según GA4 vs el ROAS reportado por Meta. ¿Cuánta diferencia hay y a qué puede deberse?"' },
      { icon: '🗄️', name: 'Exportar GA4 a BigQuery y analizar con IA', tools: ['gemini', 'claude'], detail: 'Configurar la exportación GA4 → BigQuery y usar IA para generar queries SQL, analizar datos crudos y detectar patrones que los informes estándar de GA4 no muestran.', prompt: '"Genera una query BigQuery para calcular el Customer Lifetime Value de los usuarios por fuente de adquisición usando la tabla de eventos de GA4 exportada."' },
      { icon: '🔌', name: 'Conectar GA4 con Looker Studio via IA', tools: ['gemini'], detail: 'Gemini integrado en Looker Studio puede generar campos calculados, interpretar datos automáticamente y responder preguntas en lenguaje natural sobre los datos del informe.', prompt: 'Desde Looker Studio + Gemini: "¿Qué canal tuvo mejor rendimiento este mes? ¿Hay alguna anomalía en los datos que debería revisar?"' }
    ]
  },
  {
    id: 'p5', num: '05', title: 'Visualización de Datos', subtitle: 'Dashboards, artifacts interactivos y reporting',
    items: [
      { icon: '📊', name: 'Live Artifact interactivo con datos reales de GA4', tools: ['claude'], detail: 'Claude conectado vía MCP a GA4 genera dashboards HTML interactivos con datos reales: KPIs, tendencias, top páginas, fuentes de tráfico. Todo en tiempo real sin exportar nada.', prompt: '"Crea un dashboard interactivo con mis datos de GA4 de los últimos 30 días: sesiones, tasa de conversión, top 10 páginas y desglose por canal. Añade comparativa con el período anterior."' },
      { icon: '🔭', name: 'Extraer y analizar datos con la extensión de Chrome', tools: ['claude'], detail: 'La extensión de Claude accede a la interfaz de GA4 en el navegador, lee tablas y gráficas, y las transforma en análisis o exportaciones sin necesidad de API ni exportaciones manuales.', prompt: 'Con la extensión y GA4 abierto: "Extrae los datos de esta tabla y genera un análisis comparativo con el período anterior destacando las principales variaciones."' },
      { icon: '📈', name: 'Diseñar la estructura de un informe en Looker Studio', tools: ['gemini', 'chatgpt'], detail: 'La IA propone qué páginas incluir, qué gráficas y métricas mostrar en cada sección, y puede generar las fórmulas de campos calculados para Looker Studio.', prompt: '"Diseña la estructura de un informe de Looker Studio para un ecommerce de formación con GA4: qué páginas, gráficas y KPIs incluir en cada sección."' },
      { icon: '🎨', name: 'Crear visualizaciones custom desde datos GA4', tools: ['claude'], detail: 'Exporta datos de GA4 o pásalos como CSV y Claude genera visualizaciones personalizadas: funnels, comparativas de períodos, gráficas de cohortes, mapas de calor.', prompt: '"Aquí están mis datos de embudo de conversión por semana (CSV). Crea una visualización interactiva que muestre dónde se caen los usuarios en cada paso del proceso."' },
      { icon: '📱', name: 'Informe ejecutivo automatizado periódico', tools: ['claude', 'n8n'], detail: 'Pipeline que extrae datos de GA4, los analiza con IA y genera automáticamente un informe ejecutivo enviado por email en el formato y frecuencia deseada (diario, semanal, mensual).', prompt: 'Flujo n8n: Cron lunes 8h → GA4 API → Claude API ("resume los KPIs y destaca lo más relevante") → Gmail → informe ejecutivo enviado automáticamente.' }
    ]
  },
  {
    id: 'p6', num: '06', title: 'Análisis de Datos', subtitle: 'Interpretación, insights y toma de decisiones',
    items: [
      { icon: '🧠', name: 'Analista de datos personal: Gem / GPT / Claude Project', tools: ['gemini', 'chatgpt', 'claude'], detail: 'Agente especializado con el contexto de tu negocio: objetivos, KPIs, estructura del sitio, histórico. Listo para interpretar cualquier dato de GA4 que le pases en lenguaje natural.', prompt: 'System: "Eres mi analista de analítica digital. Conoces mi web, mis objetivos y KPIs clave. Cuando te pase datos de GA4 los interpretas en el contexto de mi negocio."' },
      { icon: '🔎', name: 'Diagnóstico de caídas o anomalías de tráfico', tools: ['claude', 'gemini'], detail: 'Pasa los datos de un período con anomalía y la IA identifica posibles causas: cambios en campañas, problemas técnicos, estacionalidad, actualizaciones de algoritmo.', prompt: '"Mis sesiones orgánicas cayeron un 35% entre el 10 y el 17 de marzo. Aquí están los datos por canal, dispositivo y landing page. ¿Cuál es la causa más probable?"' },
      { icon: '🚀', name: 'Análisis de funnel y optimización de conversión', tools: ['multi'], detail: 'Con datos del embudo, la IA identifica los puntos de mayor abandono, propone hipótesis de causa y sugiere tests A/B o mejoras concretas ordenadas por impacto potencial.', prompt: '"Mis tasas de paso en el checkout: inicio 100%, carrito 65%, datos personales 48%, pago 30%, gracias 22%. Analiza dónde optimizar primero y qué hipótesis tienen más sentido."' },
      { icon: '👥', name: 'Análisis de segmentos y cohortes de usuarios', tools: ['claude', 'gemini'], detail: 'Identificar qué segmentos de usuarios tienen mayor valor, mejor retención o mayor propensión a convertir, usando datos de cohortes de GA4 y dimensiones custom.', prompt: '"Analiza mis cohortes de usuarios de los últimos 6 meses. ¿Qué fuente de adquisición tiene mejor retención a 30 días? ¿Y mejor LTV estimado?"' },
      { icon: '📉', name: 'Análisis de atribución multi-canal', tools: ['claude', 'chatgpt'], detail: 'Comparar modelos de atribución de GA4 (último clic, primer clic, basado en datos) y entender el impacto real de cada canal en las decisiones de inversión publicitaria.', prompt: '"Compara el modelo de atribución último clic vs basado en datos en mis conversiones de los últimos 3 meses. ¿Qué canales están infravalorados o sobrevalorados?"' },
      { icon: '🔮', name: 'Interpretar métricas predictivas de GA4', tools: ['gemini', 'claude'], detail: 'Interpretar y actuar sobre las métricas predictivas de GA4 (probabilidad de compra, abandono, revenue prediction) para priorizar audiencias y acciones de marketing.', prompt: '"GA4 indica que el 15% de mis usuarios tienen alta probabilidad de abandono en 7 días. ¿Qué acciones de retención me recomiendas y cómo segmentarlas en Google Ads?"' },
      { icon: '📊', name: 'Interpretación de informes de GA4 en lenguaje natural', tools: ['claude', 'gemini'], detail: 'Pasa capturas o datos exportados de cualquier informe de GA4 y la IA explica qué significan los números, qué conclusiones se pueden extraer y qué acciones tomar.', prompt: '"Aquí está mi informe de adquisición de los últimos 30 días (imagen/CSV). Explícame qué está pasando, qué es preocupante y qué oportunidades veo."' }
    ]

const toolBadges = {
  claude: '<span class="badge claude">Claude</span>',
  gemini: '<span class="badge gemini">Gemini</span>',
  chatgpt: '<span class="badge chatgpt">ChatGPT</span>',
  n8n: '<span class="badge n8n">n8n</span>',
  multi: '<span class="badge multi">Claude · Gemini · ChatGPT</span>'
};

function renderPhases(filter) {
  const container = document.getElementById('phasesContainer');
  container.innerHTML = '';
  let totalItems = 0, totalPhases = 0;
  phases.forEach(phase => {
    if (filter !== 'all' && phase.id !== filter) return;
    totalItems += phase.items.length;
    totalPhases++;
    const block = document.createElement('div');
    block.className = 'phase-block ' + phase.id;
    block.innerHTML = `
      <div class="phase-header" onclick="this.closest('.phase-block').classList.toggle('open');this.querySelector('.chevron').style.transform=this.closest('.phase-block').classList.contains('open')?'rotate(180deg)':''">
        <div class="phase-number">${phase.num}</div>
        <div class="phase-title"><h2>${phase.title}</h2><div class="subtitle">${phase.subtitle}</div></div>
        <span class="phase-count">${phase.items.length} casos</span>
        <span class="chevron">▼</span>
      </div>
      <div class="phase-body">
        <div class="items-list">
          ${phase.items.map(item => `
            <div class="item-card" onclick="this.classList.toggle('expanded')">
              <div class="item-top">
                <span class="item-icon">${item.icon}</span>
                <div class="item-main">
                  <div class="item-name">${item.name}</div>
                  <div class="item-tools">${item.tools.map(t => toolBadges[t]).join('')}</div>
                </div>
              </div>
              <div class="item-detail">${item.detail}<div class="detail-prompt">${item.prompt}</div></div>
            </div>`).join('')}
        </div>
      </div>`;
    if (filter !== 'all') block.classList.add('open');
    container.appendChild(block);
  });
  document.getElementById('totalBar').innerHTML = `<span>${totalItems}</span> casos de uso · <span>${totalPhases}</span> fases del proyecto · Haz clic en cada fase para expandir · Haz clic en cada caso para ver detalles y prompt de ejemplo`;
}

function filterPhase(id, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPhases(id);
}

renderPhases('all');
