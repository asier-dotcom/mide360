<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA en Analítica Digital con GA4 · MIDE</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #0f1117;
  color: #e8eaf0;
  min-height: 100vh;
  padding: 28px 20px 48px;
}

/* HEADER */
.header { text-align:center; margin-bottom:28px; }
.header-logo { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:14px; }
.header-logo img { height:32px; }
.header h1 { font-size:1.65rem; font-weight:700; color:#fff; letter-spacing:-0.02em; margin-bottom:6px; }
.header p { color:#7b8099; font-size:0.85rem; }

/* BADGE LEGEND */
.badge-legend { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom:24px; }
.badge { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:0.7rem; font-weight:600; letter-spacing:0.03em; }
.badge.claude  { background:#1e2a1e; color:#6fcf97; border:1px solid #2d4a2d; }
.badge.gemini  { background:#1a1e2e; color:#7986cb; border:1px solid #2a3050; }
.badge.chatgpt { background:#1e2a24; color:#26a69a; border:1px solid #1e3a30; }
.badge.n8n     { background:#2a1e1e; color:#ef9a9a; border:1px solid #4a2020; }
.badge.multi   { background:#2a2218; color:#ffcc80; border:1px solid #4a3a10; }

/* FILTER BAR */
.filter-bar {
  display:flex; gap:8px; justify-content:center; flex-wrap:wrap;
  margin-bottom:20px; max-width:960px; margin-left:auto; margin-right:auto;
}
.filter-btn {
  background:#161b27; border:1px solid #232840; color:#7b8099;
  padding:5px 14px; border-radius:20px; font-size:0.72rem; cursor:pointer;
  transition:all 0.15s;
}
.filter-btn:hover, .filter-btn.active {
  background:#1e2a4a; border-color:#4a6aaa; color:#a0c0ff;
}

/* PHASES */
.phases-container { max-width:960px; margin:0 auto; display:flex; flex-direction:column; gap:6px; }

.phase-block {
  background:#161b27; border:1px solid #232840; border-radius:12px;
  overflow:hidden; transition:border-color 0.2s;
}
.phase-block:hover { border-color:#3a4060; }

.phase-header {
  display:flex; align-items:center; gap:14px; padding:16px 20px;
  cursor:pointer; user-select:none;
}
.phase-number {
  width:32px; height:32px; border-radius:8px; display:flex;
  align-items:center; justify-content:center; font-size:0.8rem; font-weight:700; flex-shrink:0;
}
.phase-title { flex:1; }
.phase-title h2 { font-size:0.95rem; font-weight:600; color:#fff; line-height:1.2; }
.phase-title .subtitle { font-size:0.72rem; color:#5a6080; margin-top:2px; }
.phase-count { font-size:0.7rem; color:#5a6080; background:#1e2335; padding:2px 8px; border-radius:10px; white-space:nowrap; }
.chevron { color:#5a6080; font-size:0.8rem; transition:transform 0.25s; flex-shrink:0; }
.phase-block.open .chevron { transform:rotate(180deg); }

.phase-body { display:none; padding:0 16px 16px; }
.phase-block.open .phase-body { display:block; }
.items-list { display:flex; flex-direction:column; gap:8px; }

/* ITEM CARD */
.item-card {
  background:#0d1019; border:1px solid #1e2335; border-radius:8px;
  overflow:hidden; cursor:pointer; transition:border-color 0.15s, background 0.15s;
}
.item-card:hover { background:#111420; border-color:#2e3555; }
.item-card.expanded { background:#0d1019; border-color:#2e3555; }

.item-top { display:flex; align-items:flex-start; gap:10px; padding:12px 14px 10px; }
.item-accent { width:3px; flex-shrink:0; align-self:stretch; border-radius:2px 0 0 2px; position:absolute; left:0; top:0; bottom:0; }
.item-icon { font-size:1.05rem; line-height:1; margin-top:1px; flex-shrink:0; }
.item-main { flex:1; min-width:0; }
.item-name { font-size:0.83rem; font-weight:600; color:#d0d4e8; line-height:1.3; }
.item-tools { display:flex; flex-wrap:wrap; gap:4px; margin-top:6px; }

/* expanded body */
.item-body { display:none; padding:0 14px 14px; }
.item-card.expanded .item-body { display:block; }

.item-detail {
  font-size:0.78rem; color:#7b8099; line-height:1.65;
  padding-bottom:12px; border-bottom:1px solid #1a1f30;
  margin-bottom:12px;
}

/* PROMPT SECTION */
.prompt-section {}
.prompt-label {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:8px;
}
.prompt-label-text {
  font-size:0.65rem; font-weight:700; letter-spacing:0.08em;
  color:#4a7090; text-transform:uppercase;
}
.copy-btn {
  display:inline-flex; align-items:center; gap:5px;
  background:#1a2535; border:1px solid #2a3a50; color:#6a9abf;
  padding:3px 10px; border-radius:12px; font-size:0.65rem; font-weight:600;
  cursor:pointer; transition:all 0.15s; letter-spacing:0.03em;
}
.copy-btn:hover { background:#1e2f45; border-color:#4a7aaa; color:#90c0e8; }
.copy-btn.copied { background:#1a2e1a; border-color:#2a5a2a; color:#6fcf97; }

.prompt-box {
  background:#080b10; border:1px solid #1a2030; border-left:3px solid;
  border-radius:6px; padding:12px 14px;
  font-family:'Courier New', 'Consolas', monospace;
  font-size:0.72rem; color:#9ab8d0; line-height:1.7;
  white-space:pre-wrap; word-break:break-word;
}

/* phase color classes */
.p1 .phase-number { background:#1a2a3a; color:#4fc3f7; }
.p2 .phase-number { background:#1a2a2a; color:#4dd0e1; }
.p3 .phase-number { background:#1a2a1a; color:#81c784; }
.p4 .phase-number { background:#2a2a1a; color:#fff176; }
.p5 .phase-number { background:#2a1a2a; color:#ce93d8; }
.p6 .phase-number { background:#2a1a1a; color:#ef9a9a; }
.p7 .phase-number { background:#1a2040; color:#90caf9; }
.p8 .phase-number { background:#202a1a; color:#a5d6a7; }

.p1 { border-left:3px solid #4fc3f7; }
.p2 { border-left:3px solid #4dd0e1; }
.p3 { border-left:3px solid #81c784; }
.p4 { border-left:3px solid #fff176; }
.p5 { border-left:3px solid #ce93d8; }
.p6 { border-left:3px solid #ef9a9a; }
.p7 { border-left:3px solid #90caf9; }
.p8 { border-left:3px solid #a5d6a7; }

.phase-color-p1 { border-left-color:#4fc3f7 !important; }
.phase-color-p2 { border-left-color:#4dd0e1 !important; }
.phase-color-p3 { border-left-color:#81c784 !important; }
.phase-color-p4 { border-left-color:#fff176 !important; }
.phase-color-p5 { border-left-color:#ce93d8 !important; }
.phase-color-p6 { border-left-color:#ef9a9a !important; }
.phase-color-p7 { border-left-color:#90caf9 !important; }
.phase-color-p8 { border-left-color:#a5d6a7 !important; }

.prompt-label-color-p1 { color:#4fc3f7 !important; }
.prompt-label-color-p2 { color:#4dd0e1 !important; }
.prompt-label-color-p3 { color:#81c784 !important; }
.prompt-label-color-p4 { color:#d4c900 !important; }
.prompt-label-color-p5 { color:#ce93d8 !important; }
.prompt-label-color-p6 { color:#ef9a9a !important; }
.prompt-label-color-p7 { color:#90caf9 !important; }
.prompt-label-color-p8 { color:#a5d6a7 !important; }

/* TOTAL BAR */
.total-bar {
  text-align:center; margin-top:24px; padding:12px;
  background:#161b27; border-radius:8px; font-size:0.75rem; color:#5a6080;
  max-width:960px; margin-left:auto; margin-right:auto;
}
.total-bar span { color:#a0b0ff; font-weight:700; }
</style>
</head>

<script>
const phases = [{"num": "01", "title": "Estrategia & Plan de Medición", "subtitle": "Antes de tocar una herramienta", "items": [{"icon": "🗺️", "name": "Elaborar el Plan de Medición Digital", "tools": ["Multi"], "detail": "Define objetivos de negocio → KPIs → eventos GA4 → dimensiones custom. La IA estructura el plan completo a partir de una descripción del negocio, tipo de web y objetivos.", "prompt": "Actúa como consultor senior de analítica digital. Voy a describirte mi negocio y necesito que generes un Plan de Medición Digital completo y estructurado.\n\nMi negocio: [describe aquí tu web, producto o servicio, modelo de negocio y público objetivo].\n\nEl plan debe incluir:\n1. Objetivos de negocio (máx. 4-5, en formato SMART)\n2. KPIs por objetivo (métrica principal + métricas secundarias)\n3. Micro y macroconversiones a medir en GA4\n4. Eventos GA4 necesarios (nombre en snake_case, parámetros recomendados)\n5. Dimensiones custom de usuario y de evento sugeridas\n6. Fuentes de tráfico y canales relevantes a monitorizar\n\nFormato de salida: tabla estructurada por objetivo, con columnas Objetivo / KPI / Evento GA4 / Parámetros."}, {"icon": "🏷️", "name": "Crear la Guía de Etiquetado de UTMs", "tools": ["Multi"], "detail": "La IA genera una guía de convenciones UTM adaptada a la empresa: taxonomía de canales, naming conventions, ejemplos reales y tabla de referencia.", "prompt": "Crea una Guía de Etiquetado UTM completa para mi empresa. Tenemos campañas en: Google Ads, Meta Ads, email marketing (HubSpot), newsletter, eventos presenciales y colaboraciones con partners.\n\nLa guía debe incluir:\n1. Tabla de valores permitidos para utm_source, utm_medium y utm_campaign con ejemplos reales\n2. Reglas de naming: uso de minúsculas, separadores (guion bajo vs guion), longitud máxima\n3. Ejemplos de URLs etiquetadas por canal (al menos 6 ejemplos distintos)\n4. Qué NO hacer: errores comunes y cómo evitarlos\n5. Tabla de referencia rápida imprimible\n\nSé muy específico con los valores permitidos y no uses ejemplos genéricos. Adapta los nombres de campaña al sector [indica tu sector]."}, {"icon": "💎", "name": "Crear un Gem / GPT especialista en UTMs", "tools": ["Gemini", "ChatGPT"], "detail": "Agente entrenado con tu guía de UTMs que genera URLs etiquetadas automáticamente. Disponible como Gemini Gem o ChatGPT GPT.", "prompt": "Eres el asistente especialista en etiquetado UTM de [nombre de empresa]. Tu única función es generar URLs correctamente etiquetadas siguiendo esta guía:\n\nVALORES PERMITIDOS:\n- utm_source: google, meta, hubspot, linkedin, newsletter, directo, partner\n- utm_medium: cpc, email, social, organic, display, evento, referral\n- utm_campaign: usa el formato [año]-[trimestre]-[nombre-campaña] en minúsculas con guiones\n\nREGLAS: siempre minúsculas, sin espacios (usa guion bajo), sin caracteres especiales.\n\nCuando el usuario te diga el canal, la campaña y el contenido del enlace, devuelve:\n1. La URL completa etiquetada\n2. Una tabla con cada parámetro y su valor\n3. Un aviso si detectas algún error en los inputs\n\nEmpieza preguntando: ¿Cuál es la URL base y para qué campaña necesitas el enlace?"}, {"icon": "📋", "name": "Taxonomía de eventos y parámetros GA4", "tools": ["Multi"], "detail": "Definir nomenclatura y estructura de todos los eventos custom, parámetros y dimensiones antes de la implementación para evitar inconsistencias.", "prompt": "Diseña una taxonomía de eventos GA4 completa para mi sitio web. Tipo de web: [ecommerce / SaaS / blog / membresía / otro].\n\nPara cada evento necesito:\n1. Nombre del evento (snake_case, máx. 40 caracteres)\n2. Categoría (interacción, conversión, navegación, ecommerce, formulario)\n3. Parámetros que lleva (nombre + tipo de dato + ejemplo de valor)\n4. Si debe marcarse como conversión (sí/no + motivo)\n5. Trigger recomendado en GTM\n\nIncluye eventos para: interacciones con formularios, scroll y lectura de contenido, clics en CTAs principales, inicio y completado de procesos clave, errores relevantes para el negocio.\n\nFormato: tabla exportable con todas las columnas especificadas."}, {"icon": "📊", "name": "Análisis de benchmarks del sector", "tools": ["Claude", "ChatGPT"], "detail": "Identificar métricas relevantes del sector y comparar con benchmarks de la industria para establecer metas realistas.", "prompt": "Necesito benchmarks de rendimiento web y de analítica para mi sector. Mi negocio es [describe sector, país y tipo de audiencia].\n\nProporciona datos de referencia para:\n1. Tasa de conversión media (rango bajo / medio / alto del sector)\n2. Tasa de rebote / engagement rate en GA4\n3. Duración media de sesión y páginas por sesión\n4. CTR medio en búsqueda orgánica (Search Console)\n5. Coste por lead / coste por adquisición si aplica\n\nPara cada métrica: indica la fuente del dato, el año de referencia y qué factores pueden hacer que mi web esté por encima o por debajo del benchmark.\n\nTermina con una tabla resumen y recomendaciones de qué métricas priorizar para mejorar primero."}, {"icon": "🎯", "name": "Definir estrategia de segmentación de audiencias", "tools": ["Claude", "Gemini"], "detail": "Proponer qué segmentos de usuarios definir en GA4 y Google Ads desde el inicio, alineados con los objetivos y las etapas del funnel.", "prompt": "Diseña una estrategia de segmentación de audiencias en GA4 para mi negocio. Modelo: [SaaS B2B / ecommerce / formación / otro]. Objetivos principales: [adquisición / retención / upsell].\n\nPara cada segmento propuesto, especifica:\n1. Nombre del segmento y descripción\n2. Condiciones exactas para incluir un usuario (eventos, dimensiones, tiempo)\n3. Etapa del funnel a la que corresponde (TOFU / MOFU / BOFU)\n4. Cómo usarlo: remarketing en Google Ads, comunicación personalizada, análisis\n5. Métricas clave a monitorizar para ese segmento\n\nPropón al menos 8 segmentos diferenciados y ordénalos por prioridad de implementación."}]}, {"num": "02", "title": "Configuración de GA4", "subtitle": "Setup, propiedades y parametrización", "items": [{"icon": "⚙️", "name": "Auditar una propiedad GA4 existente", "tools": ["Claude"], "detail": "Con el MCP de GA4, Claude revisa la configuración completa, detecta inconsistencias, eventos sin datos, conversiones duplicadas y configuraciones incorrectas.", "prompt": "Realiza una auditoría completa de mi propiedad GA4. Necesito un informe estructurado que cubra:\n\n1. EVENTOS: lista todos los eventos activos. Señala cuáles no han recibido datos en los últimos 30 días y cuáles tienen nombres inconsistentes o que no siguen convenciones.\n\n2. CONVERSIONES: identifica conversiones duplicadas, conversiones con 0 registros en 30 días, y si faltan conversiones importantes según el tipo de negocio.\n\n3. DIMENSIONES CUSTOM: lista las configuradas, cuáles no reciben datos, cuáles están mal tipadas.\n\n4. CONFIGURACIÓN GENERAL: revisa si el dominio está bien configurado, si hay filtros de IP de tráfico interno, si la retención de datos está en 14 meses, si está vinculada con Google Ads y Search Console.\n\n5. CALIDAD DE DATOS: detecta sesiones con duración 0, porcentaje de tráfico sin atribuir, eventos con parámetros vacíos.\n\nFormato de salida: informe con secciones, nivel de severidad (crítico / importante / recomendable) y acción correctora para cada hallazgo."}, {"icon": "🛡️", "name": "Verificar el Consent Mode con la extensión de Chrome", "tools": ["Claude"], "detail": "La extensión de Claude analiza el CMP/banner de cookies e indica si el Consent Mode v2 está correctamente implementado.", "prompt": "Analiza la implementación del Consent Mode v2 en esta web. Necesito verificar los siguientes puntos:\n\n1. ¿Está el Consent Mode v2 activo? Comprueba si hay llamadas a gtag('consent', 'default', ...) antes de que cargue GA4.\n\n2. ¿Se están configurando correctamente las señales? Verifica: ad_storage, analytics_storage, ad_user_data, ad_personalization.\n\n3. Estado ANTES de interactuar con el banner: ¿qué valores tienen las señales por defecto?\n\n4. Estado DESPUÉS de aceptar todas las cookies: ¿cambian las señales a 'granted'?\n\n5. Estado DESPUÉS de rechazar: ¿las señales de ads pasan a 'denied'?\n\n6. ¿Hay eventos de GA4 disparándose antes de obtener el consentimiento?\n\nDame un informe con el estado de cada punto, capturas del dataLayer relevantes y, si hay problemas, cómo corregirlos."}, {"icon": "🎯", "name": "Configurar conversiones y audiencias de GA4", "tools": ["Gemini", "ChatGPT"], "detail": "La IA guía la configuración de eventos como conversiones y propone audiencias de remarketing basadas en el comportamiento.", "prompt": "Guíame para configurar correctamente conversiones y audiencias en GA4 para mi negocio de [tipo de negocio].\n\nPARTE 1 - CONVERSIONES:\n- ¿Qué eventos debo marcar como conversión? (dame una lista razonada para mi tipo de negocio)\n- Pasos exactos en la interfaz de GA4 para marcar un evento como conversión\n- Cómo verificar que la conversión está registrando datos correctamente\n- Diferencia entre conversiones de GA4 e importadas desde Google Ads: cuándo usar cada una\n\nPARTE 2 - AUDIENCIAS DE REMARKETING:\nPropón 6 audiencias de remarketing para mi negocio con:\n- Nombre de la audiencia\n- Condiciones exactas de inclusión (eventos + parámetros + tiempo)\n- Duración de membresía recomendada\n- Para qué tipo de campaña usarla (búsqueda / display / YouTube / Performance Max)\n\nIncluye audiencias de: visitantes sin convertir, usuarios de alto valor, compradores recientes y usuarios en riesgo de abandono."}, {"icon": "🔗", "name": "Guía personalizada de dimensiones custom", "tools": ["Claude", "ChatGPT"], "detail": "Proponer qué dimensiones y métricas personalizadas de usuario y evento registrar según el modelo de negocio.", "prompt": "Diseña la estrategia de dimensiones personalizadas en GA4 para mi negocio. Tipo: [SaaS / ecommerce / formación / membresía].\n\nRecuerda los límites: 25 dimensiones de usuario, 50 dimensiones de evento, 50 métricas de evento.\n\nPara cada dimensión propuesta incluye:\n1. Nombre técnico (snake_case) y nombre legible para la interfaz\n2. Tipo: dimensión de usuario o de evento\n3. Tipo de dato: texto / número / booleano\n4. Qué información captura y por qué es valiosa\n5. Cómo poblarla: desde el dataLayer, desde una cookie, desde el backend\n\nPropón dimensiones para segmentar por: plan de suscripción, estado del usuario (logueado/anónimo), categorías de contenido consumido, fuente de registro original, y comportamiento de compra.\n\nTermina con el orden de implementación por prioridad."}, {"icon": "📋", "name": "Documentar la configuración de GA4 automáticamente", "tools": ["Claude"], "detail": "Generar documentación técnica actualizada de la propiedad: eventos activos, conversiones, dimensiones y flujos configurados.", "prompt": "Genera documentación técnica completa de mi propiedad GA4 en formato Markdown. La documentación debe servir para que cualquier nuevo miembro del equipo entienda la configuración sin necesidad de acceder a GA4.\n\nEstructura el documento así:\n# Documentación GA4 - [Nombre de la propiedad]\n## 1. Información general (ID, dominio, fecha de creación, vinculaciones)\n## 2. Eventos activos (tabla: nombre / descripción / parámetros / es conversión)\n## 3. Dimensiones custom (tabla: nombre técnico / scope / tipo / descripción)\n## 4. Conversiones configuradas (nombre / evento base / valor asignado)\n## 5. Audiencias activas (nombre / condiciones / duración / uso)\n## 6. Integraciones (Google Ads, Search Console, BigQuery, etc.)\n## 7. Filtros y exclusiones de tráfico\n## 8. Notas de implementación y decisiones tomadas\n\nUsa los datos de mi propiedad GA4 para completar cada sección. Donde no tengas datos, indica [PENDIENTE DE COMPLETAR]."}]}, {"num": "03", "title": "Implementación Técnica con GTM", "subtitle": "Tags, triggers, variables y dataLayer", "items": [{"icon": "📦", "name": "Generar código de dataLayer desde descripción", "tools": ["Claude", "ChatGPT"], "detail": "Describe qué datos quieres capturar y la IA genera el código dataLayer.push completo y correcto listo para implementar.", "prompt": "Genera el código JavaScript de dataLayer.push para capturar los siguientes datos en mi web. Necesito implementarlo en [indica el momento: al cargar la página / al hacer clic / al completar un formulario / al iniciar sesión].\n\nDatos a capturar:\n- [Dato 1: nombre y descripción, ejemplo: \"plan del usuario: Starter, Pro o Enterprise\"]\n- [Dato 2: nombre y descripción]\n- [Dato 3: nombre y descripción]\n\nEl código debe:\n1. Usar naming en snake_case compatible con GA4\n2. Incluir comprobaciones para evitar errores si algún valor es nulo\n3. Ir acompañado de comentarios explicativos\n4. Incluir la instrucción de cómo llamarlo (en qué momento del ciclo de vida de la página)\n\nDespués del código, dame también la especificación de la Variable de Capa de Datos en GTM para leer cada valor."}, {"icon": "🏷️", "name": "Especificación completa de tags/triggers/variables en GTM", "tools": ["Claude", "ChatGPT"], "detail": "La IA genera instrucciones paso a paso de qué tag, trigger y variable crear en GTM para cualquier caso de medición.", "prompt": "Necesito implementar el siguiente tracking en Google Tag Manager. Descríbeme exactamente qué crear paso a paso:\n\nCASO DE USO: [describe qué quieres medir, ejemplo: \"quiero trackear cuando un usuario hace scroll hasta el 75% de la página en las URLs que contengan /blog/ y enviarlo como evento GA4 con el nombre article_read\"].\n\nPara cada elemento, indícame:\n\nVARIABLES necesarias:\n- Tipo de variable, nombre sugerido, configuración exacta\n\nTRIGGER necesario:\n- Tipo de trigger, condiciones de activación (con los valores exactos a introducir)\n\nTAG de GA4:\n- Tipo de etiqueta, nombre del evento, parámetros a enviar y de dónde los lee\n\nIncluye también cómo verificarlo en el modo Preview de GTM antes de publicar."}, {"icon": "📄", "name": "Analizar y auditar el JSON exportado de GTM", "tools": ["Claude", "ChatGPT"], "detail": "Pasa el JSON del contenedor GTM y la IA detecta tags duplicados, triggers sin asociar, variables sin uso y configuraciones incorrectas.", "prompt": "Analiza el JSON exportado de mi contenedor de Google Tag Manager y genera un informe de auditoría completo.\n\n[Pega aquí el contenido del JSON o adjunta el archivo]\n\nEl informe debe identificar:\n\n1. TAGS DUPLICADOS: etiquetas que envían el mismo evento GA4 más de una vez\n2. TAGS SIN TRIGGER: etiquetas que nunca se dispararán porque no tienen trigger asignado\n3. TRIGGERS SIN TAG: triggers configurados que no están asociados a ninguna etiqueta\n4. VARIABLES SIN USO: variables definidas que no se referencian en ningún tag ni trigger\n5. PROBLEMAS DE CONFIGURACIÓN: IDs de medición incorrectos, configuraciones de GA4 desactualizadas, uso de UA en lugar de GA4\n6. NAMING INCONSISTENTE: etiquetas o variables sin convención de nombres clara\n7. OPORTUNIDADES DE MEJORA: mediciones que faltan según el tipo de web\n\nFormato: tabla por categoría con nombre del elemento, descripción del problema y acción correctora recomendada. Ordena por prioridad (crítico / importante / opcional)."}, {"icon": "✨", "name": "Generar nuevas mediciones desde el JSON de GTM", "tools": ["Claude", "ChatGPT"], "detail": "A partir de la estructura existente, la IA propone y genera nuevas mediciones manteniendo coherencia con el naming y estructura ya presentes.", "prompt": "Analiza mi contenedor GTM actual y propón nuevas mediciones que debería implementar. \n\n[Pega aquí el JSON del contenedor o describe las etiquetas existentes]\n\nTipo de web: [ecommerce / SaaS / formación / otro]\n\nPara cada nueva medición propuesta:\n1. Nombre del evento GA4 (siguiendo el naming que ya uso en mi contenedor)\n2. Por qué es valiosa para el negocio\n3. Especificación completa: Variable + Trigger + Tag (con los valores exactos a configurar en GTM)\n4. Dificultad de implementación: baja / media / alta\n5. Si requiere cambios en el código de la web o solo configuración en GTM\n\nPropón un mínimo de 5 mediciones nuevas, ordenadas por impacto potencial en el negocio."}, {"icon": "🔎", "name": "Diagnóstico de implementación en tiempo real", "tools": ["Claude"], "detail": "La extensión de Claude analiza la web en tiempo real: qué dataLayer se dispara, qué tags se activan y si hay errores o parámetros mal formateados.", "prompt": "Analiza la implementación de GA4 y GTM en esta web mientras navego por ella. Necesito un diagnóstico en tiempo real que cubra:\n\n1. EVENTOS DISPARADOS: lista todos los eventos que se han enviado a GA4 durante esta sesión con sus parámetros\n2. VALIDACIÓN DE PARÁMETROS: ¿algún parámetro esperado llega vacío, nulo o con formato incorrecto?\n3. DUPLICADOS: ¿se dispara algún evento más de una vez en la misma acción del usuario?\n4. CONSENT MODE: ¿está activo? ¿las señales son correctas antes y después del banner?\n5. DATALAYER: ¿qué objetos se pushean al dataLayer? ¿tienen la estructura correcta?\n6. ERRORES DE CONSOLA: ¿hay errores JavaScript relacionados con GTM o GA4?\n\nDame el diagnóstico página a página mientras navego y señala cualquier anomalía con su posible solución."}, {"icon": "🛡️", "name": "Generar regex y filtros para GTM/GA4", "tools": ["Claude", "ChatGPT"], "detail": "La IA genera expresiones regulares para filtros de URL, condiciones de trigger y exclusiones de tráfico interno.", "prompt": "Genera las expresiones regulares y configuraciones de filtros que necesito para GTM y GA4.\n\nCASO 1 - TRIGGER DE URL:\nNecesito un trigger que se active solo en estas URLs: [describe las URLs o patrones, ejemplo: \"páginas de producto que siguen el patrón /tienda/producto/*, pero no /tienda/admin/* ni /tienda/checkout/gracias\"]\n\nCASO 2 - EXCLUSIÓN DE TRÁFICO INTERNO:\nIPs de oficina a excluir: [lista tus IPs]\n\nCASO 3 - FILTRO DE HOSTNAME:\nSolo quiero datos del dominio [tu-dominio.com], excluyendo staging, localhost y scrapers.\n\nPara cada caso proporciona:\n- La regex exacta lista para copiar y pegar en GTM o GA4\n- Explicación de cómo funciona la expresión\n- Dónde exactamente pegarla en GTM (tipo de trigger, campo específico)\n- Casos de prueba: URLs que deberían coincidir y URLs que no deberían coincidir"}, {"icon": "🔄", "name": "Migrar implementación de UA a GA4 via GTM", "tools": ["Claude", "ChatGPT"], "detail": "Analizar las etiquetas de Universal Analytics en GTM y generar el equivalente en GA4 aprovechando los nuevos eventos recomendados.", "prompt": "Tengo etiquetas de Universal Analytics en GTM que necesito migrar a GA4. Analiza estas etiquetas y genera su equivalente en GA4:\n\n[Lista o pega aquí tus etiquetas UA: nombre de la etiqueta, categoría/acción/etiqueta del evento UA, trigger que usa]\n\nPara cada etiqueta UA, proporciona:\n1. Nombre del evento GA4 equivalente (usando eventos recomendados de Google cuando aplique)\n2. Parámetros GA4 equivalentes a la categoría, acción y etiqueta de UA\n3. Configuración exacta de la nueva etiqueta GA4 en GTM\n4. Si el trigger existente sirve o necesita modificarse\n5. Si hay parámetros adicionales que ahora podría capturar que antes no era posible\n\nAl final, dame una tabla de equivalencias UA → GA4 y una lista de los eventos UA que no tienen equivalente directo en GA4 con tu recomendación para cada uno."}]}, {"num": "04", "title": "Conexiones e Integraciones", "subtitle": "GA4 + Google Ads + Search Console + CRM + Meta", "items": [{"icon": "🔗", "name": "Vincular GA4 con Google Ads y configurar conversiones", "tools": ["Gemini", "ChatGPT"], "detail": "Guía para vincular propiedades, importar conversiones a Google Ads, activar el autotagging y verificar la integración.", "prompt": "Guíame paso a paso para vincular GA4 con Google Ads y configurar correctamente las conversiones importadas.\n\nNecesito instrucciones para:\n\n1. VINCULACIÓN: pasos exactos para vincular la propiedad GA4 [ID: xxxxxx] con la cuenta de Google Ads [ID: xxx-xxx-xxxx]\n\n2. AUTOTAGGING: cómo verificar que el autotagging está activo en Google Ads y qué significa si no lo está\n\n3. IMPORTAR CONVERSIONES: qué conversiones de GA4 debo importar a Google Ads y cuáles es mejor crear directamente en Ads. Pros y contras de cada enfoque.\n\n4. CONFIGURACIÓN DE SMART BIDDING: una vez importadas las conversiones, cómo ajustar las estrategias de puja para que las use correctamente\n\n5. REMARKETING: cómo activar las audiencias de GA4 para usarlas en campañas de Google Ads, qué audiencias tiene más sentido usar para cada tipo de campaña\n\n6. VERIFICACIÓN: cómo comprobar en 7 días que todo está funcionando correctamente"}, {"icon": "🔍", "name": "Análisis cruzado GA4 + Search Console", "tools": ["Claude"], "detail": "Con los MCP de GA4 y Search Console activos, Claude cruza impresiones/clics orgánicos con sesiones y conversiones para encontrar oportunidades SEO.", "prompt": "Realiza un análisis cruzado entre los datos de Search Console y GA4 para identificar oportunidades de optimización SEO con impacto en conversión.\n\nDel análisis quiero extraer:\n\n1. QUICK WINS DE CTR: páginas/queries con posición media 1-10 pero CTR por debajo del benchmark del sector. ¿Qué títulos y meta descripciones mejoraría?\n\n2. TRÁFICO SIN CONVERSIÓN: landing pages con muchas sesiones orgánicas pero tasa de conversión inferior al promedio del sitio. ¿Qué tienen en común?\n\n3. OPORTUNIDADES DE CONTENIDO: queries con impresiones altas pero posición > 10. ¿Qué tipo de contenido o mejora técnica podría subirlas al top 10?\n\n4. PÁGINAS DE ALTO VALOR: landing pages con buena tasa de conversión pero pocas sesiones orgánicas. ¿Merece la pena invertir en SEO para esas URLs?\n\n5. TENDENCIAS: consultas que han ganado o perdido posición significativamente en los últimos 3 meses.\n\nPresenta los hallazgos en orden de impacto potencial con recomendaciones accionables."}, {"icon": "📧", "name": "Cruzar datos de HubSpot email con GA4", "tools": ["Claude", "n8n"], "detail": "Usar el MCP de HubSpot o flujos de n8n para cruzar datos de email marketing con el comportamiento web en GA4 usando UTMs.", "prompt": "Analiza el rendimiento real de mis campañas de email de HubSpot cruzando los datos con GA4. El enlace entre ambas plataformas son los parámetros UTM de los enlaces del email.\n\nNecesito responder:\n\n1. ¿Qué campañas de email generan más sesiones en la web? (utm_campaign)\n2. De esas sesiones, ¿cuántas acaban en conversión y cuál es la tasa de conversión por campaña?\n3. ¿Hay diferencia de comportamiento entre los usuarios que llegan desde email vs otros canales? (páginas visitadas, tiempo en sesión, tasa de rebote)\n4. ¿Qué tipo de contenido de email (utm_content) tiene mejor ratio clic-a-conversión?\n5. ¿Cuál es el coste por lead/conversión estimado por campaña de email?\n6. ¿Hay algún segmento de audiencia de HubSpot que convierta significativamente mejor?\n\nPeríodo de análisis: últimos 3 meses. Formato de salida: tabla comparativa de campañas + conclusiones y recomendaciones."}, {"icon": "📱", "name": "Cruzar datos de Meta Ads con GA4", "tools": ["Claude", "n8n"], "detail": "Con el MCP de Meta Ads, Claude analiza el rendimiento real de campañas de pago social y lo compara con las sesiones y conversiones en GA4.", "prompt": "Compara el rendimiento de mis campañas de Meta Ads según lo que reporta Meta vs lo que registra GA4 para el mismo período. El objetivo es entender la discrepancia y tomar decisiones de inversión basadas en datos fiables.\n\nAnálisis a realizar:\n\n1. DISCREPANCIA DE CONVERSIONES: ¿cuántas conversiones reporta Meta vs cuántas registra GA4 por campaña? ¿A qué puede deberse la diferencia? (atribución, cookieless, view-through)\n\n2. COSTE REAL POR CONVERSIÓN: calculado con las conversiones de GA4 (más conservador) vs el que reporta Meta\n\n3. CALIDAD DEL TRÁFICO: de los usuarios que llegan de Meta Ads (utm_source=meta), ¿cómo se comportan en la web? ¿Tienen mayor o menor engagement que otros canales?\n\n4. CAMPAÑAS MÁS EFICIENTES: ordenadas por ROAS real (datos GA4) de mayor a menor\n\n5. RECOMENDACIONES: basándote en estos datos, ¿dónde debería redistribuir el presupuesto?\n\nPeríodo: [indica fechas]. Campañas activas: [lista las campañas]."}, {"icon": "🗄️", "name": "Exportar GA4 a BigQuery y analizar con IA", "tools": ["Gemini", "Claude"], "detail": "Configurar la exportación GA4 → BigQuery y usar IA para generar queries SQL y detectar patrones que los informes estándar no muestran.", "prompt": "Genera queries SQL de BigQuery para analizar los datos crudos de GA4. Mi tabla sigue la estructura estándar de exportación GA4 a BigQuery: proyecto.dataset.events_YYYYMMDD.\n\nQUERY 1 - LTV por fuente de adquisición:\nCalcula el valor acumulado de conversiones por usuario agrupado por su fuente de adquisición original (first_touch), en los últimos 6 meses.\n\nQUERY 2 - Funnel de conversión detallado:\nMuestra el % de usuarios que completan cada paso del funnel: [evento1] → [evento2] → [evento3], con el tiempo medio entre pasos.\n\nQUERY 3 - Usuarios de alto valor:\nIdentifica usuarios con más de X conversiones o valor total > Y en los últimos 90 días, con su canal de adquisición y dispositivo.\n\nQUERY 4 - Análisis de cohortes:\nRetención semanal de usuarios por semana de adquisición (cohorte), durante las primeras 8 semanas.\n\nPara cada query: incluye comentarios explicativos, indica qué campos pueden necesitar ajuste según mi implementación específica y el coste estimado en bytes procesados."}, {"icon": "🔌", "name": "Conectar GA4 con Looker Studio via IA", "tools": ["Gemini"], "detail": "Gemini integrado en Looker Studio genera campos calculados, interpreta datos automáticamente y responde preguntas en lenguaje natural.", "prompt": "Ayúdame a configurar y sacar el máximo partido a la integración de Gemini en Looker Studio con mis datos de GA4.\n\nNecesito:\n\n1. CAMPOS CALCULADOS AVANZADOS: genera las fórmulas de Looker Studio para:\n   - Tasa de conversión ponderada por canal\n   - Valor medio por sesión (revenue / sessions)\n   - Score de calidad de tráfico combinando engagement_rate + conversion_rate\n   - Comparativa % vs período anterior para cualquier métrica\n\n2. PREGUNTAS EN LENGUAJE NATURAL: ¿qué tipo de preguntas puedo hacerle a Gemini directamente en Looker Studio? Dame 10 ejemplos útiles para analizar mis datos de GA4.\n\n3. ALERTAS INTELIGENTES: cómo configurar alertas automáticas en Looker Studio que se disparen cuando una métrica clave se desvíe más de un X% del promedio de los últimos 7 días\n\n4. MEJORES PRÁCTICAS: cómo estructurar el dataset de GA4 en Looker Studio para que Gemini pueda interpretarlo mejor"}]}, {"num": "05", "title": "Visualización de Datos", "subtitle": "Dashboards, artifacts interactivos y reporting", "items": [{"icon": "📊", "name": "Live Artifact interactivo con datos reales de GA4", "tools": ["Claude"], "detail": "Claude conectado vía MCP genera dashboards HTML interactivos con datos reales de GA4: KPIs, tendencias, top páginas, fuentes de tráfico.", "prompt": "Crea un dashboard interactivo completo con mis datos de GA4. Accede a mi propiedad GA4 [ID: xxxxxx] y extrae los datos de los últimos 30 días.\n\nEl dashboard debe incluir:\n\nSECCIÓN 1 - KPIs principales (con comparativa vs período anterior):\n- Sesiones totales y variación %\n- Usuarios activos y variación %\n- Tasa de conversión y variación %\n- Revenue o valor de conversiones (si aplica)\n\nSECCIÓN 2 - Tendencia temporal:\n- Gráfica de línea: sesiones diarias últimos 30 días vs mismos 30 días del mes anterior\n\nSECCIÓN 3 - Desglose por canal:\n- Tabla o gráfica de barras: sesiones, tasa de conversión y conversiones por canal\n\nSECCIÓN 4 - Top 10 páginas:\n- Tabla con página, sesiones, tasa de engagement y conversiones\n\nRequisitos técnicos: dashboard HTML interactivo con Chart.js, diseño oscuro profesional, filtros por período si es posible."}, {"icon": "🔭", "name": "Extraer y analizar datos con la extensión de Chrome", "tools": ["Claude"], "detail": "La extensión de Claude accede a la interfaz de GA4 en el navegador, lee tablas y gráficas y las transforma en análisis sin exportaciones manuales.", "prompt": "Estoy viendo este informe en GA4 [indica qué informe tienes abierto: adquisición / comportamiento / conversiones / otro]. Extrae todos los datos visibles en la tabla/gráfica y realiza el siguiente análisis:\n\n1. RESUMEN EJECUTIVO: 3-4 frases con los hallazgos más importantes de estos datos\n2. COMPARATIVA: si hay datos de período anterior, ¿qué ha mejorado y qué ha empeorado?\n3. ANOMALÍAS: ¿hay algún dato que se salga significativamente de la tendencia general?\n4. TOP Y BOTTOM: ¿qué elemento tiene mejor rendimiento? ¿Cuál tiene peor y por qué podría ser?\n5. RECOMENDACIONES: 3 acciones concretas basadas en estos datos, ordenadas por impacto\n\nExporta también los datos en formato de tabla Markdown para poder pegarlos en un documento."}, {"icon": "📈", "name": "Diseñar la estructura de un informe en Looker Studio", "tools": ["Gemini", "ChatGPT"], "detail": "La IA propone estructura del informe, qué gráficas incluir en cada sección y puede generar fórmulas de campos calculados.", "prompt": "Diseña la estructura completa de un informe en Looker Studio para [tipo de negocio: ecommerce / SaaS / agencia / otro]. La audiencia del informe es [dirección / equipo de marketing / cliente].\n\nPara cada página del informe, especifica:\n- Título de la página y su propósito\n- Métricas y dimensiones a mostrar\n- Tipo de gráfica recomendada para cada dato (scorecard / línea / barras / tabla / mapa)\n- Filtros de fecha y dimensión a incluir\n\nP?ginas recomendadas (adapta según el negocio):\n1. Resumen ejecutivo (portada con KPIs clave)\n2. Adquisición de tráfico (por canal, campaña, fuente)\n3. Comportamiento en web (páginas, scroll, engagement)\n4. Conversiones y objetivos\n5. Rendimiento de campañas de pago (si aplica)\n\nIncluye también las fórmulas de campos calculados más útiles para este tipo de negocio en Looker Studio."}, {"icon": "🎨", "name": "Crear visualizaciones custom desde datos GA4", "tools": ["Claude"], "detail": "Exporta datos de GA4 o pásalos como CSV y Claude genera visualizaciones personalizadas: funnels, comparativas, gráficas de cohortes.", "prompt": "Crea una visualización interactiva a partir de estos datos de GA4 [pega aquí los datos en CSV o tabla]:\n\nTipo de visualización que necesito: [funnel de conversión / comparativa de canales / gráfica de cohortes / evolución temporal / mapa de calor de páginas]\n\nRequisitos:\n1. Diseño oscuro profesional, con colores que destaquen las métricas más importantes\n2. Interactivo: hover con tooltips que muestren el dato exacto\n3. Si es un funnel: muestra el % de paso entre cada etapa y el % de abandono\n4. Si es comparativa: incluye línea de media/benchmark como referencia\n5. Exportable: que el usuario pueda descargar los datos en CSV\n\nTecnología: HTML + JavaScript con Chart.js (sin dependencias externas adicionales).\n\nDespués de la visualización, añade un párrafo de interpretación con los 3 insights más relevantes que se extraen del gráfico."}, {"icon": "📱", "name": "Informe ejecutivo automatizado periódico", "tools": ["Claude", "n8n"], "detail": "Pipeline que extrae datos de GA4, los analiza con IA y genera automáticamente un informe ejecutivo enviado por email.", "prompt": "Diseña el flujo completo en n8n para generar y enviar automáticamente un informe ejecutivo semanal de GA4.\n\nARQUITECTURA DEL FLUJO:\n1. Trigger: Cron cada lunes a las 8:00h\n2. Nodo GA4 API: extrae sesiones, usuarios, conversiones, revenue y top 5 páginas de los últimos 7 días y los 7 días anteriores\n3. Nodo Claude API: envía los datos con este prompt:\n\n\"Eres el analista de marketing de [empresa]. Con estos datos de GA4 de la última semana [DATOS], genera un informe ejecutivo en HTML con: resumen en 3 bullet points, tabla comparativa semana actual vs anterior, 1 alerta si alguna métrica cae >15%, y 2 recomendaciones accionables. Tono profesional y directo.\"\n\n4. Nodo Gmail: envía el HTML resultante como cuerpo del email\n- Asunto: \"📊 Informe semanal GA4 - Semana del [fecha]\"\n- Destinatarios: [lista de emails]\n\nDame el JSON del flujo de n8n listo para importar, o las instrucciones detalladas nodo a nodo."}]}, {"num": "06", "title": "Análisis de Datos", "subtitle": "Interpretación, insights y toma de decisiones", "items": [{"icon": "🧠", "name": "Analista de datos personal: Gem / GPT / Claude Project", "tools": ["Claude", "Gemini", "ChatGPT"], "detail": "Agente especializado con el contexto de tu negocio listo para interpretar cualquier dato de GA4 en lenguaje natural.", "prompt": "[SYSTEM PROMPT para tu Gem, GPT o Claude Project]\n\nEres el analista de analítica digital de [nombre de empresa]. Tienes acceso completo al contexto del negocio y tu trabajo es interpretar datos de GA4 de forma accionable.\n\nCONTEXTO DEL NEGOCIO:\n- Tipo de web: [ecommerce / SaaS / formación / otro]\n- Principales conversiones: [lista de conversiones y su valor]\n- Canales de marketing activos: [SEO, Google Ads, Meta Ads, email...]\n- KPIs prioritarios: [tasa de conversión objetivo: X%, coste por lead objetivo: X€, etc.]\n- Estacionalidad: [indica si hay meses clave o épocas bajas]\n\nCÓMO DEBES RESPONDER:\n- Siempre contextualiza el dato dentro del negocio (no digas solo \"las sesiones bajaron\", di por qué importa)\n- Prioriza los insights por impacto económico\n- Termina siempre con 2-3 recomendaciones accionables y concretas\n- Si el dato es ambiguo, indica qué información adicional necesitarías para dar una conclusión firme\n\nCuando el usuario te pase datos de GA4 (en texto, CSV o imagen), analízalos siguiendo estas instrucciones."}, {"icon": "🔎", "name": "Diagnóstico de caídas o anomalías de tráfico", "tools": ["Claude", "Gemini"], "detail": "Pasa los datos de un período con anomalía y la IA identifica posibles causas: campañas, técnica, estacionalidad, algoritmos.", "prompt": "Necesito diagnosticar una anomalía en mis datos de GA4. Aquí están los datos:\n\nPERÍODO NORMAL (referencia): [fechas] → Sesiones: X, Usuarios: X, Conversiones: X\nPERÍODO CON ANOMALÍA: [fechas] → Sesiones: X, Usuarios: X, Conversiones: X\nVariación: [X%]\n\nDesglose adicional disponible:\n- Por canal: [pega la tabla]\n- Por dispositivo: [pega la tabla]\n- Por landing page: [pega la tabla]\n- Por país/región: [si aplica]\n\nAnaliza las posibles causas siguiendo este orden:\n1. ¿Afecta a todos los canales o solo a uno? → problema de tracking vs problema de tráfico real\n2. ¿Afecta a todos los dispositivos? → posible problema técnico en un dispositivo específico\n3. ¿Hay alguna landing page que concentre la caída? → problema de página o de campaña\n4. ¿Coincide con algún cambio en campañas de pago, SEO o web?\n5. ¿Es estacional o puntual?\n\nDame las 3 hipótesis más probables ordenadas por verosimilitud y cómo verificar cada una."}, {"icon": "🚀", "name": "Análisis de funnel y optimización de conversión", "tools": ["Multi"], "detail": "Con datos del embudo, la IA identifica puntos de mayor abandono, propone hipótesis de causa y sugiere tests A/B.", "prompt": "Analiza mi funnel de conversión e identifica dónde y por qué se pierden usuarios. Aquí están los datos:\n\nFUNNEL ACTUAL:\n- Paso 1 [nombre]: X usuarios (100%)\n- Paso 2 [nombre]: X usuarios (X%)\n- Paso 3 [nombre]: X usuarios (X%)\n- Paso 4 [nombre]: X usuarios (X%)\n\nContexto adicional: [describe brevemente qué ocurre en cada paso, qué formularios o fricciones hay]\n\nPara cada punto de abandono significativo (>20% de caída), proporciona:\n1. HIPÓTESIS: ¿por qué crees que los usuarios abandonan aquí? (mínimo 3 hipótesis por paso)\n2. DATOS A BUSCAR: qué datos adicionales de GA4 confirmarían o refutarían cada hipótesis\n3. TEST A/B: qué cambio concreto probarías primero y cómo lo medirías\n4. QUICK WINS: si hay algo que mejorar sin necesidad de test (fricciones obvias), indícalo\n\nOrdena las recomendaciones por impacto potencial × facilidad de implementación."}, {"icon": "👥", "name": "Análisis de segmentos y cohortes de usuarios", "tools": ["Claude", "Gemini"], "detail": "Identificar qué segmentos tienen mayor valor, mejor retención o mayor propensión a convertir usando cohortes y dimensiones custom.", "prompt": "Analiza el comportamiento de cohortes y segmentos de usuarios en mi GA4 para identificar los patrones de mayor valor para el negocio.\n\nPeríodo de análisis: últimos 6 meses (cohortes semanales o mensuales)\n\nPreguntas a responder:\n\n1. RETENCIÓN: ¿qué cohorte de adquisición (mes/semana) tiene mejor retención a 30, 60 y 90 días? ¿A qué fuente de adquisición corresponde?\n\n2. LTV: ¿qué cohorte tiene mayor valor acumulado? ¿Hay diferencias significativas entre cohortes de diferentes canales?\n\n3. TIME TO CONVERT: ¿cuánto tiempo tarda en convertir el usuario medio desde su primera visita? ¿Varía por canal?\n\n4. SEGMENTOS DE ALTO VALOR: define los criterios que comparten los usuarios con mayor LTV (dispositivo, canal de entrada, páginas visitadas, número de sesiones antes de convertir)\n\n5. USUARIOS EN RIESGO: ¿cómo identificar usuarios activos que están mostrando señales de abandono?\n\nFormato: tabla de cohortes + conclusiones por pregunta + recomendaciones de audiencias a crear."}, {"icon": "📉", "name": "Análisis de atribución multi-canal", "tools": ["Claude", "ChatGPT"], "detail": "Comparar modelos de atribución de GA4 y entender el impacto real de cada canal en las decisiones de inversión publicitaria.", "prompt": "Realiza un análisis de atribución multi-canal en GA4 para entender el rol real de cada canal en mis conversiones y optimizar la distribución del presupuesto.\n\nConversiones a analizar: [nombre de la conversión principal]\nPeríodo: últimos 3 meses\nCanales activos: [SEO, Google Ads, Meta Ads, email, directo, referral]\n\nAnálisis a realizar:\n\n1. COMPARATIVA DE MODELOS: para cada canal, muestra las conversiones asignadas por:\n   - Último clic (modelo actual)\n   - Primer clic\n   - Basado en datos (si hay suficiente volumen)\n   ¿Qué canales están infravalorados y cuáles sobrevalorados con el modelo de último clic?\n\n2. RUTAS DE CONVERSIÓN MÁS FRECUENTES: ¿cuáles son los 5 caminos de canales más comunes antes de convertir?\n\n3. CANALES DE INTRODUCCIÓN vs CIERRE: ¿qué canales suelen ser el primer contacto? ¿Cuáles cierran la conversión?\n\n4. IMPLICACIONES DE PRESUPUESTO: con estos datos, ¿cómo redistribuirías la inversión?\n\nDame también las limitaciones de este análisis (cookieless, sesiones de 30 días, etc.) para interpretar los datos correctamente."}, {"icon": "🔮", "name": "Interpretar métricas predictivas de GA4", "tools": ["Gemini", "Claude"], "detail": "Actuar sobre métricas predictivas de GA4 (probabilidad de compra, abandono, revenue prediction) para priorizar audiencias y acciones.", "prompt": "GA4 está generando métricas predictivas para mis usuarios. Ayúdame a interpretarlas y a crear un plan de acción.\n\nDATOS ACTUALES DE GA4 PREDICTIVO:\n- Usuarios con alta probabilidad de compra en 7 días: X% del total activo\n- Usuarios con alta probabilidad de abandono (churn): X% \n- Revenue prediction próximos 28 días: X€\n\nPara cada métrica predictiva:\n\n1. QUÉ SIGNIFICA EXACTAMENTE: cómo calcula GA4 esta predicción y qué nivel de fiabilidad tiene\n\n2. AUDIENCIA A CREAR: condiciones exactas para crear la audiencia en GA4 basada en esta predicción\n\n3. ACCIONES DE MARKETING:\n   - Para usuarios con alta prob. de compra: qué campaña activar, con qué mensaje y en qué canal\n   - Para usuarios con alta prob. de abandono: qué acción de retención lanzar (email, remarketing, oferta)\n\n4. CÓMO MEDIR EL ÉXITO: KPIs a seguir para saber si las acciones sobre estas audiencias están funcionando\n\n5. FRECUENCIA DE REVISIÓN: con qué frecuencia debo revisar y actualizar estas audiencias"}, {"icon": "📊", "name": "Interpretación de informes de GA4 en lenguaje natural", "tools": ["Claude", "Gemini"], "detail": "Pasa capturas o datos de cualquier informe de GA4 y la IA explica qué significan los números y qué acciones tomar.", "prompt": "Analiza este informe de GA4 y dame una interpretación completa orientada a la toma de decisiones.\n\n[Adjunta imagen del informe o pega los datos en texto/tabla]\n\nTipo de informe: [adquisición / comportamiento / conversiones / monetización / retención]\nPeríodo: [fechas]\nContexto: [indica si hay algún evento especial en ese período: campaña, cambio en la web, estacionalidad]\n\nQuiero que me respondas:\n1. ¿Qué está pasando? Resumen en lenguaje no técnico para presentar a dirección\n2. ¿Qué es positivo y por qué? (máximo 3 puntos)\n3. ¿Qué es preocupante y por qué? (máximo 3 puntos)\n4. ¿Qué información falta para sacar conclusiones más firmes?\n5. ¿Cuáles son las 3 acciones prioritarias basadas en estos datos?\n\nUsa un tono directo y ejecutivo. Evita tecnicismos innecesarios."}]}, {"num": "07", "title": "Automatizaciones & Flujos con n8n", "subtitle": "Alertas, pipelines y reporting automático", "items": [{"icon": "⚡", "name": "Conectar GA4 con n8n para análisis automático", "tools": ["n8n"], "detail": "Flujo que extrae datos de GA4 vía API, los envía a Claude o GPT para análisis y distribuye los insights por email o Slack.", "prompt": "Diseña e implementa un flujo en n8n que extraiga datos de GA4 automáticamente cada día y genere un análisis con IA.\n\nCONFIGURACIÓN DEL FLUJO:\n\nNodo 1 - Cron: ejecutar cada día laborable a las 9:00h\n\nNodo 2 - GA4 API (Google Analytics Data API v1):\n- Property ID: [tu ID]\n- Métricas: sessions, activeUsers, conversions, totalRevenue, engagementRate\n- Dimensiones: date, sessionDefaultChannelGroup\n- Período: yesterday (rango de 1 día)\n\nNodo 3 - HTTP Request a Claude API:\n- Endpoint: https://api.anthropic.com/v1/messages\n- Prompt: \"Eres el analista de [empresa]. Aquí están los datos de GA4 de ayer: [DATOS]. Compara con los valores típicos de esta web y dame: 1) Un titular de máximo 10 palabras resumiendo el día, 2) 2-3 bullet points con lo más relevante, 3) Una alerta si alguna métrica cae más del 20% respecto a la media de los últimos 7 días.\"\n\nNodo 4 - Slack / Gmail: enviar el resumen al canal o email del equipo\n\nDame el JSON del flujo n8n exportable o las instrucciones nodo a nodo con todos los parámetros."}, {"icon": "🚨", "name": "Sistema de alertas automáticas de anomalías", "tools": ["n8n", "Claude"], "detail": "n8n monitoriza KPIs de GA4. Si detecta desviación superior al umbral, llama a Claude para diagnosticar y envía una alerta.", "prompt": "Crea un sistema de alertas inteligentes en n8n que detecte anomalías en mis KPIs de GA4 y las diagnostique automáticamente con IA.\n\nLÓGICA DEL SISTEMA:\n\n1. Extracción de datos (cada hora o cada día):\n   - Datos del período actual (hoy / esta semana)\n   - Media de los últimos 7/28 días como baseline\n   - Calcula % de desviación para cada métrica\n\n2. Condiciones de alerta (configura umbrales):\n   - Sesiones: alerta si caída > 25%\n   - Tasa de conversión: alerta si caída > 15%\n   - Revenue: alerta si caída > 20%\n   - Errores en eventos: alerta si aparecen eventos con 0 datos\n\n3. Cuando se dispara una alerta, llamar a Claude API con:\n\"Hay una anomalía en GA4: [métrica] ha caído un [X%] respecto a la media. Datos actuales: [datos]. Histórico reciente: [datos]. Lista las 5 causas más probables ordenadas por verosimilitud y qué debo comprobar primero.\"\n\n4. Enviar a Slack el diagnóstico con nivel de severidad (🔴 crítico / 🟡 importante / 🟢 informativo)\n\nDame el flujo completo con la lógica de comparación y los nodos de condición configurados."}, {"icon": "📊", "name": "Informe semanal multicanal automatizado", "tools": ["n8n", "Claude"], "detail": "Pipeline que recopila datos de GA4, Meta Ads, Google Ads y Search Console y genera un informe ejecutivo automático.", "prompt": "Diseña el pipeline completo en n8n para generar cada lunes un informe ejecutivo multicanal que consolide datos de GA4, Meta Ads, Google Ads y Search Console.\n\nARQUITECTURA DEL FLUJO:\n\nNodo 1 - Trigger: Cron cada lunes a las 7:00h\n\nNodos 2-5 (en paralelo):\n- GA4 API: sesiones, usuarios, conversiones, revenue por canal (últimos 7 días vs 7 anteriores)\n- Meta Ads API: inversión, impresiones, clics, conversiones, coste por resultado por campaña\n- Google Ads API: inversión, clics, conversiones, CPA, ROAS por campaña\n- Search Console API: clics, impresiones, CTR, posición media (últimos 7 días vs 7 anteriores)\n\nNodo 6 - Merge: consolida todos los datos en un objeto JSON estructurado\n\nNodo 7 - Claude API:\nPrompt: \"Genera un informe ejecutivo semanal en HTML con estos datos de marketing: [JSON]. Incluye: tabla resumen de KPIs por canal, gráfica ASCII de tendencia, 3 highlights positivos, 2 alertas o preocupaciones, y 3 recomendaciones prioritarias para la próxima semana.\"\n\nNodo 8 - Gmail: envío automático con asunto dinámico y HTML formateado\n\nIncluye el JSON del flujo n8n y el prompt completo de Claude."}, {"icon": "💾", "name": "Backup automático de datos GA4 a Google Sheets", "tools": ["n8n"], "detail": "Flujo que extrae métricas clave de GA4 diariamente y las almacena en Google Sheets creando un histórico propio.", "prompt": "Crea un flujo en n8n que haga backup diario de los datos de GA4 en Google Sheets, generando un histórico propio que supere el límite de retención de GA4.\n\nCONFIGURACIÓN DEL FLUJO:\n\nNodo 1 - Cron: cada día a las 23:55h (para capturar el día completo)\n\nNodo 2 - GA4 API: extrae los datos de hoy\nMétricas a guardar: sessions, activeUsers, newUsers, conversions, totalRevenue, engagementRate, averageSessionDuration\nDimensiones: date, sessionDefaultChannelGroup, deviceCategory\n\nNodo 3 - Google Sheets:\n- Spreadsheet: [nombre o ID de tu hoja]\n- Hoja: \"GA4_Daily_Data\"\n- Operación: Append Row\n- Columnas: Fecha | Canal | Dispositivo | Sesiones | Usuarios | Usuarios nuevos | Conversiones | Revenue | Eng. Rate | Duración media\n\nNodo 4 (opcional) - Nodo de verificación: comprueba que el append se realizó correctamente y envía confirmación por Slack\n\nIncluye también instrucciones para crear la hoja de Google Sheets con el formato correcto y un nodo de inicialización para cargar datos históricos de los últimos 12 meses."}, {"icon": "🔔", "name": "Notificaciones de conversiones en tiempo real", "tools": ["n8n"], "detail": "Notificaciones instantáneas cuando se produce una conversión importante usando eventos propios con n8n.", "prompt": "Configura un sistema de notificaciones en tiempo real en n8n que avise cuando se produzcan conversiones importantes.\n\nARQUITECTURA (dos opciones):\n\nOPCIÓN A - Via Webhook propio (más inmediato):\n1. En tu web/app: cuando ocurra una conversión, envía un POST a un webhook de n8n con los datos de la transacción\n2. Nodo n8n Webhook: recibe los datos\n3. Nodo IF: filtra según criterios (valor > 100€, tipo de conversión = \"compra\", plan = \"Enterprise\")\n4. Nodo Slack: envía mensaje con formato:\n   \"💰 Nueva conversión: [tipo] | Valor: [X€] | Usuario: [email/ID] | Fuente: [utm_source] | Plan: [plan]\"\n\nOPCIÓN B - Via GA4 Measurement Protocol + polling:\n1. Cron cada 15 minutos\n2. GA4 API: comprueba conversiones de los últimos 20 minutos\n3. Compara con las ya notificadas (usa un nodo de memoria o Google Sheets como registro)\n4. Para las nuevas: envía notificación\n\nPara conversiones de alto valor (>500€): notificación adicional por Telegram o SMS.\n\nDame la configuración completa del flujo con el formato exacto de los mensajes de notificación."}, {"icon": "🔄", "name": "Sincronización de audiencias GA4 → Google Ads", "tools": ["n8n"], "detail": "Flujo que actualiza periódicamente las audiencias de remarketing en Google Ads basándose en nuevos segmentos calculados en GA4.", "prompt": "Diseña un flujo en n8n que mantenga sincronizadas las audiencias de GA4 con las listas de remarketing de Google Ads de forma automática.\n\nFLUJO PRINCIPAL (semanal):\n\nNodo 1 - Cron: cada domingo a las 22:00h\n\nNodo 2 - GA4 A const PHASE_COLORS = {
  p1:'#4fc3f7', p2:'#4dd0e1', p3:'#81c784', p4:'#fff176',
  p5:'#ce93d8', p6:'#ef9a9a', p7:'#90caf9', p8:'#a5d6a7'
};

const toolBadges = {
  'Claude':  '<span class="badge claude">Claude</span>',
  'Gemini':  '<span class="badge gemini">Gemini</span>',
  'ChatGPT': '<span class="badge chatgpt">ChatGPT</span>',
  'n8n':     '<span class="badge n8n">n8n</span>',
  'Multi':   '<span class="badge multi">Claude · Gemini · ChatGPT</span>'
};

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderPhases(filter) {
  const container = document.getElementById('phasesContainer');
  container.innerHTML = '';
  let totalItems = 0, totalPhases = 0;

  phases.forEach((phase, pi) => {
    const pid = 'p' + (pi + 1);
    if (filter !== 'all' && pid !== filter) return;
    totalItems += phase.items.length;
    totalPhases++;

    const color = PHASE_COLORS[pid];
    const block = document.createElement('div');
    block.className = 'phase-block ' + pid;

    const itemsHtml = phase.items.map((item, ii) => {
      const cardId = pid + '_' + ii;
      const badges = item.tools.map(t => toolBadges[t] || `<span class="badge">${t}</span>`).join('');
      const promptEscaped = escapeHtml(item.prompt);
      return `
        <div class="item-card" id="card_${cardId}" onclick="toggleCard('${cardId}')">
          <div class="item-top">
            <span class="item-icon">${item.icon}</span>
            <div class="item-main">
              <div class="item-name">${escapeHtml(item.name)}</div>
              <div class="item-tools">${badges}</div>
            </div>
            <svg style="flex-shrink:0;margin-top:2px;transition:transform 0.2s;color:#5a6080" id="arr_${cardId}" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div class="item-body" id="body_${cardId}">
            <div class="item-detail">${escapeHtml(item.detail)}</div>
            <div class="prompt-section">
              <div class="prompt-label">
                <span class="prompt-label-text prompt-label-color-${pid}">💬 Prompt reutilizable</span>
                <button class="copy-btn" id="copybtn_${cardId}" onclick="copyPrompt(event, '${cardId}')">
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                  Copiar prompt
                </button>
              </div>
              <div class="prompt-box phase-color-${pid}" id="prompt_${cardId}">${promptEscaped}</div>
            </div>
          </div>
        </div>`;
    }).join('');

    block.innerHTML = `
      <div class="phase-header" onclick="togglePhase(this)">
        <div class="phase-number">${phase.num}</div>
        <div class="phase-title">
          <h2>${escapeHtml(phase.title)}</h2>
          <div class="subtitle">${escapeHtml(phase.subtitle)}</div>
        </div>
        <span class="phase-count">${phase.items.length} casos</span>
        <span class="chevron">▼</span>
      </div>
      <div class="phase-body">
        <div class="items-list">${itemsHtml}</div>
      </div>`;

    if (filter !== 'all') block.classList.add('open');
    container.appendChild(block);
  });

  document.getElementById('totalBar').innerHTML =
    `<span>${totalItems}</span> casos de uso en <span>${totalPhases}</span> fases · Haz clic en cada fase para expandir · Haz clic en cada caso para ver el prompt completo y copiarlo`;
}

function togglePhase(header) {
  header.closest('.phase-block').classList.toggle('open');
}

function toggleCard(id) {
  const card = document.getElementById('card_' + id);
  const body = document.getElementById('body_' + id);
  const arr  = document.getElementById('arr_' + id);
  const open = card.classList.toggle('expanded');
  body.style.display = open ? 'block' : 'none';
  if (arr) arr.style.transform = open ? 'rotate(180deg)' : '';
}

function copyPrompt(e, id) {
  e.stopPropagation();
  const el  = document.getElementById('prompt_' + id);
  const btn = document.getElementById('copybtn_' + id);
  navigator.clipboard.writeText(el.innerText).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Copiado`;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copiar prompt`;
    }, 2000);
  });
}

function filterPhase(id, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPhases(id);
}

renderPhases('all');
</script>
